---
- name: Install lazygit
  become: true
  community.general.pacman:
    name: lazygit
    state: present

- name: Install/update tree-sitter CLI via npm
  ansible.builtin.shell: |
    source ~/.nvm/nvm.sh
    npm update -g tree-sitter-cli
  args:
    executable: /bin/bash
  register: npm_deps_result
  changed_when: "'up to date' not in npm_deps_result.stdout"
