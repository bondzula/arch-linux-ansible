---
- name: Locate active Node binary directory
  ansible.builtin.find:
    paths: "{{ ansible_facts.env.HOME }}/.nvm/versions/node"
    file_type: directory
    depth: 1
  register: node_versions

- name: Set node_bin_path fact
  ansible.builtin.set_fact:
    node_bin_path: "{{ (node_versions.files | sort(attribute='ctime', reverse=true) | map(attribute='path') | first) ~ '/bin' }}"
  when: node_versions.files | length > 0

- name: Fail if nvm/node is not present
  ansible.builtin.fail:
    msg: "nvm/node not found — run the nodejs role first."
  when: node_bin_path is not defined

- name: Include LSP tasks
  ansible.builtin.include_tasks: lsp.yml
  tags: [neovim, lsp]

- name: Include formatter and linter tasks
  ansible.builtin.include_tasks: formatters.yml
  tags: [neovim, formatters]

- name: Include additional dependencies
  ansible.builtin.include_tasks: dependencies.yml
  tags: [neovim, deps]
