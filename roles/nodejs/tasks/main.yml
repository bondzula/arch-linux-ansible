---
- name: Check if nvm is already installed
  stat:
    path: "{{ ansible_facts.env.HOME }}/.nvm/nvm.sh"
  register: nvm_installed

- name: Download and install nvm
  shell: >
    curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.1/install.sh | bash
  args:
    creates: "{{ ansible_facts.env.HOME }}/.nvm/nvm.sh"
  when: not nvm_installed.stat.exists

- name: Install Node.js LTS version
  shell: |
    export NVM_DIR="{{ ansible_facts.env.HOME }}/.nvm"
    [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
    nvm install --lts
    nvm alias default 'lts/*'
  args:
    executable: /bin/bash
    creates: "{{ ansible_facts.env.HOME }}/.nvm/versions/node"

- name: Check if bun is installed
  ansible.builtin.command: which bun
  register: bun_check
  failed_when: false
  changed_when: false

- name: Install bun via official script
  ansible.builtin.shell: curl -fsSL https://bun.sh/install | bash
  when: bun_check.rc != 0
  register: bun_install
  changed_when: bun_check.rc != 0

- name: Check if pnpm is installed
  ansible.builtin.command: which pnpm
  register: pnpm_check
  failed_when: false
  changed_when: false

- name: Install pnpm via official script
  ansible.builtin.shell: curl -fsSL https://get.pnpm.io/install.sh | sh -
  when: pnpm_check.rc != 0
  register: pnpm_install
  changed_when: pnpm_check.rc != 0
