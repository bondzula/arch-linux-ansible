---
- name: Check if nvm is installed
  ansible.builtin.stat:
    path: "{{ ansible_facts.env.HOME }}/.nvm/nvm.sh"
  register: nvm_installed

- name: Install nvm (pinned)
  ansible.builtin.shell: >
    curl -fsSL https://raw.githubusercontent.com/nvm-sh/nvm/{{ nvm_version }}/install.sh | bash
  args:
    executable: /bin/bash
    creates: "{{ ansible_facts.env.HOME }}/.nvm/nvm.sh"
  when: not nvm_installed.stat.exists

- name: Drop /etc/profile.d/nvm.sh so nvm is in PATH for all login shells
  become: true
  ansible.builtin.copy:
    dest: /etc/profile.d/nvm.sh
    mode: '0644'
    content: |
      # Managed by Ansible
      export NVM_DIR="$HOME/.nvm"
      [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
      [ -s "$NVM_DIR/bash_completion" ] && \. "$NVM_DIR/bash_completion"

- name: Install Node.js ({{ node_install_version }})
  ansible.builtin.shell: |
    set -e
    export NVM_DIR="{{ ansible_facts.env.HOME }}/.nvm"
    . "$NVM_DIR/nvm.sh"
    nvm install '{{ node_install_version }}'
    nvm alias default '{{ node_install_version }}'
  args:
    executable: /bin/bash
    creates: "{{ ansible_facts.env.HOME }}/.nvm/alias/default"

- name: Install pnpm and bun via packages (no curl|bash)
  block:
    - name: Install pnpm from official repo
      become: true
      community.general.pacman:
        name: pnpm
        state: present

    - name: Install bun-bin from AUR
      kewlfft.aur.aur:
        name: bun-bin
        state: present
        use: yay
