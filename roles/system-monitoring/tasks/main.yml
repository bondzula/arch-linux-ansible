---
- name: Install lm_sensors and corectrl from official repos
  become: true
  community.general.pacman:
    name:
      - lm_sensors
      - corectrl
    state: present

- name: Check if coolercontrol-bin is installed (AUR — installed manually post-run)
  ansible.builtin.command: pacman -Q coolercontrol-bin
  register: coolercontrol_check
  changed_when: false
  failed_when: false

- name: Enable CoolerControl daemon
  become: true
  ansible.builtin.systemd_service:
    name: coolercontrold
    enabled: true
    state: started
  when: coolercontrol_check.rc == 0
