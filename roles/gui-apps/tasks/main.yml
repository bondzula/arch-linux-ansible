---
- name: Install GUI apps from official repos
  become: yes
  pacman:
    name:
      - ghostty
      - firefox
      - chromium
      - discord
      - obs-studio
      - zed
    state: present

- name: Install GUI apps from AUR
  shell: yay -S --noconfirm --needed 1password
  args:
    executable: /bin/bash
  register: yay_result
  changed_when: "'there is nothing to do' not in yay_result.stdout"

- name: Check if claude-code is installed
  command: which claude
  register: claude_check
  changed_when: false
  failed_when: false

- name: Install claude-code via native installer
  shell: curl -fsSL https://claude.ai/install.sh | bash
  when: claude_check.rc != 0
  register: claude_install
  changed_when: true

- name: Check if codex is installed
  stat:
    path: "{{ ansible_facts.env.HOME }}/.local/bin/codex"
  register: codex_check

- name: Install OpenAI Codex
  become: yes
  pacman:
    name:
      - openai-codex
    state: present
  when: not codex_check.stat.exists
