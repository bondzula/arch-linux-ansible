---
- name: Install GUI apps from official repos
  become: true
  community.general.pacman:
    name:
      - ghostty
      - firefox
      - chromium
      - discord
      - obs-studio
      - zed
    state: present
    update_cache: true

- name: Install GUI apps from AUR
  kewlfft.aur.aur:
    name:
      - 1password
      - localsend-bin
      - vscodium-bin
      - claude-code
      - openai-codex
    state: present
    use: yay

- name: Enable Ghostty user service for fast launches
  become: true
  become_user: "{{ target_user }}"
  ansible.builtin.systemd_service:
    name: app-com.mitchellh.ghostty.service
    scope: user
    enabled: true
    state: started
  failed_when: false
