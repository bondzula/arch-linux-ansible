---
- name: Install shared Wayland packages and display manager
  become: true
  community.general.pacman:
    name:
      - sddm
      - qt5-wayland
      - qt6-wayland
      - qt5ct
      - qt6ct
      - kvantum
      - xdg-desktop-portal
      - xdg-desktop-portal-gtk
      - wl-clipboard
      - brightnessctl
      - ddcutil
      - wlsunset
      - cliphist
      - polkit
      - polkit-kde-agent
      - polkit-qt6
      - kwallet
      - kwallet-pam
      - upower
      - power-profiles-daemon
      - playerctl
    state: present

- name: Enable SDDM (do not start — would yank current session)
  become: true
  ansible.builtin.systemd_service:
    name: sddm
    enabled: true
