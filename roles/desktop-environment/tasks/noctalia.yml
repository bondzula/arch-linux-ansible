---
# noctalia-shell (AUR) installs to /etc/xdg/quickshell/noctalia-shell/ and
# noctalia-qs (forked Quickshell) is installed from AUR alongside noctalia-shell.
# Runtime helpers below cover Noctalia shell integration and theme glue.

- name: Install Noctalia runtime extras
  become: true
  community.general.pacman:
    name:
      - cava
      - evolution-data-server
      - imagemagick
      - networkmanager
      - bluez
      - upower
      - power-profiles-daemon
      - playerctl
      - papirus-icon-theme
    state: present

