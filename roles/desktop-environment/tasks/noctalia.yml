---
# noctalia-shell (AUR) installs to /etc/xdg/quickshell/noctalia-shell/ and
# pulls noctalia-qs (forked Quickshell) plus imagemagick, brightnessctl,
# ffmpeg, qt6-multimedia, python, wlr-randr. See aur_packages in group_vars.

- name: Install Noctalia runtime extras
  become: true
  community.general.pacman:
    name:
      - cava
      - evolution-data-server
      - qt5ct
      - qt6ct
      - kvantum
      - papirus-icon-theme
    state: present

- name: Remove legacy local noctalia-shell config (now provided system-wide)
  become: true
  become_user: "{{ target_user }}"
  ansible.builtin.file:
    path: "{{ ansible_facts.env.HOME }}/.config/quickshell/noctalia-shell"
    state: absent
