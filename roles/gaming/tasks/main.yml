---
- name: Install gaming packages from official repos
  become: true
  community.general.pacman:
    name:
      - steam
      - gamescope
      - gamemode
      - lib32-gamemode
      - mangohud
      - lib32-mangohud
      - goverlay
      - wine
      - winetricks
      - ananicy-cpp
    state: present
    update_cache: true

- name: Install Proton-CachyOS from cachyos repo
  become: true
  community.general.pacman:
    name:
      - proton-cachyos
    state: present

- name: Add user to gamemode group
  become: true
  ansible.builtin.user:
    name: "{{ target_user }}"
    groups: gamemode
    append: true

- name: Enable gamemoded user service
  become: true
  become_user: "{{ target_user }}"
  ansible.builtin.systemd_service:
    name: gamemoded.service
    scope: user
    enabled: true
    state: started
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ ansible_facts.user_uid }}"

- name: Enable ananicy-cpp service
  become: true
  ansible.builtin.systemd_service:
    name: ananicy-cpp.service
    enabled: true
    state: started

- name: Configure RADV / Mesa environment variables system-wide
  become: true
  ansible.builtin.blockinfile:
    path: /etc/environment
    marker: "# {mark} ANSIBLE MANAGED BLOCK - RADV gaming env"
    create: true
    mode: '0644'
    block: |
      # RADV graphics pipeline library: faster shader compilation, fewer stutters.
      # `sam` enables Smart Access Memory (resizable BAR) — confirm rebar is
      # on in BIOS, otherwise this is a no-op.
      RADV_PERFTEST=gpl,sam
      # OpenGL threading (legacy games + some Proton DXVK fallbacks).
      mesa_glthread=true
