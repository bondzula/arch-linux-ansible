---
- name: Install gaming packages from official repos
  become: true
  community.general.pacman:
    name:
      - steam
      - gamescope
      - gamemode
      - lib32-gamemode
      - mangohud
      - lib32-mangohud
      - goverlay
      - wine
      - winetricks
    state: present
    update_cache: true

- name: Add user to gamemode group
  become: true
  ansible.builtin.user:
    name: "{{ target_user }}"
    groups: gamemode
    append: true

- name: Enable gamemoded user service
  become: true
  become_user: "{{ target_user }}"
  ansible.builtin.systemd_service:
    name: gamemoded.service
    scope: user
    enabled: true
    state: started
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ ansible_facts.user_uid }}"
