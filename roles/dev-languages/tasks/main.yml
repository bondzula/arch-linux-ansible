---
- name: Install programming language tooling
  become: true
  community.general.pacman:
    name:
      - gcc
      - clang
      - cmake
      - pkg-config
      - gdb
      - lldb
      - zig
      - go
      - lua
      - luarocks
      - luajit
      - python
      - uv
      - rustup
      - php
      - composer
      - nix
    state: present
    update_cache: true

- name: Install Rust stable toolchain
  become: true
  become_user: "{{ target_user }}"
  ansible.builtin.command: rustup default stable
  register: rustup_install
  changed_when: "'installed' in rustup_install.stdout or 'updated' in rustup_install.stdout"

- name: Drop /etc/profile.d/lang-paths.sh for Rust/uv/Go PATHs
  become: true
  ansible.builtin.copy:
    dest: /etc/profile.d/lang-paths.sh
    mode: '0644'
    content: |
      # Managed by Ansible
      [ -d "$HOME/.cargo/bin" ] && export PATH="$HOME/.cargo/bin:$PATH"
      [ -d "$HOME/.local/bin" ] && export PATH="$HOME/.local/bin:$PATH"
      [ -d "$HOME/go/bin" ] && export PATH="$HOME/go/bin:$PATH"

- name: Include Go tools tasks
  ansible.builtin.include_tasks: go-tools.yml
  tags: [dev, go]
