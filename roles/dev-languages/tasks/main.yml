---
- name: Install programming language tooling
  become: yes
  pacman:
    name:
      # C/C++ tooling
      - gcc
      - clang
      - cmake
      - pkg-config
      - gdb
      - lldb
      # Zig
      - zig
      # Go
      - go
      # Lua
      - lua
      - luarocks
      - luajit
      # Python with uv
      - python
      - uv
      # Rust with rustup
      - rustup
      # PHP
      - php
      - composer
      # Nix package manager
      - nix
    state: present

- name: Install Rust stable toolchain via rustup
  command: rustup default stable
  become: yes
  become_user: "{{ ansible_facts.env.USER }}"
  register: rustup_install
  changed_when: "'installed' in rustup_install.stdout or 'updated' in rustup_install.stdout"
  failed_when: false

- name: Include Go tools tasks
  ansible.builtin.include_tasks: go-tools.yml
  tags: [dev, go]
