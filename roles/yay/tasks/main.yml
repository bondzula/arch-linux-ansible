---
- name: Check if yay is installed
  command: which yay
  register: yay_check
  changed_when: false
  failed_when: false

- name: Install yay from AUR
  block:
    - name: Install base-devel (required for building AUR packages)
      become: yes
      pacman:
        name:
          - base-devel
        state: present

    - name: Clone yay repository
      git:
        repo: https://aur.archlinux.org/yay.git
        dest: /tmp/yay
        version: master
        force: yes

    - name: Build and install yay
      command: makepkg -si --noconfirm
      args:
        chdir: /tmp/yay

    - name: Clean up yay build directory
      file:
        path: /tmp/yay
        state: absent
  when: yay_check.rc != 0
